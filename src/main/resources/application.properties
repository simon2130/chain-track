spring.application.name=chain-track
# ── Application ──────────────────────────────────────────
# ── Database (PostgreSQL via Docker) ─────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chaintrack}
spring.datasource.username=${DB_USER:chaintrack_user}
spring.datasource.password=${DB_PASS:chaintrack_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ───────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-min-32chars}
jwt.expiration-ms=86400000

# ── Actuator ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── Server ────────────────────────────────────────────────
server.port=8080