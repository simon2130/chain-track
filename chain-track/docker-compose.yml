version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: chaintrack-db
    environment:
      POSTGRES_DB: chaintrack
      POSTGRES_USER: chaintrack_user
      POSTGRES_PASSWORD: chaintrack_pass
    ports:
      - "5432:5432"
    volumes:
      - chaintrack_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaintrack_user -d chaintrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: chaintrack-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/chaintrack
      DB_USER: chaintrack_user
      DB_PASS: chaintrack_pass
      JWT_SECRET: super-secret-jwt-key-for-dev-only-change-in-prod
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"

volumes:
  chaintrack_data: